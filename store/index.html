<!doctype html>

<head>

<meta name="description" content="The Made in Xiaolin store — merch & accessories. Rolled Proper.">
<meta name="theme-color" content="#7a0c12">
<meta property="og:title" content="Made in Xiaolin — Store">

<header class="topbar">

    <div class="kicker">Made in Xiaolin · Rolled Proper</div>

<div class="foot">Made in Xiaolin · Warwick, NY · 21+ · Merch &amp; accessories only</div>

<!-- checkout overlay -->
<div id="checkout" class="overlay hidden">

    <button class="x" onclick="closeCheckout()" aria-label="Close">✕</button>
    <div id="co-body"></div>
  </div>
</div>

<script src="store.js"></script>
